<?php
global $url;
global $command_running;
global $service_name;
global $service_csrf_token;

// returns literal or false 
function service_post_opname() {
	if (isset($_POST['empty'])) 
		return "empty";
	if (isset($_POST['getcovers']))
		return "getcovers"; 
	if (isset($_POST['import']))
		return  "import";
	if (isset($_POST['reindex']))
		return "reindex";
	if (isset($_POST['download']))
		return "download";
	if (isset($_POST['getdaily']))
		return "getdaily";
	return false;
}

if (empty($_SESSION['service_csrf_token'])) {
	$_SESSION['service_csrf_token'] = bin2hex(random_bytes(32));
}
$service_csrf_token = $_SESSION['service_csrf_token'];

$url->title = 'Сервис и настройки';
exec("flock -n ".ADMINOPLOCKFILE." -c 'echo 1'",$notused,$command_running);

$service_name = false;
if ($_SERVER['REQUEST_METHOD'] === 'POST') {
	$service_name = service_post_opname();
	if ($service_name !== false) {
		$postedToken = $_POST['csrf_token'] ?? '';
		if (!is_string($postedToken) || !hash_equals($service_csrf_token, $postedToken)) {
			http_response_code(403);
			die('CSRF validation failed.');
		}
	}
}

if ($command_running) {
	if (isset($_GET['opname'])) {
    	header("Refresh: 10; url=".$webroot."/service?opname=".$_GET['opname']);
	}else  {
		header("Refresh: 10; url=".$webroot."/service");
	} 
} elseif ($service_name !== false){
    header("Refresh: 2; url=".$webroot."/service?opname=".$service_name);
}


